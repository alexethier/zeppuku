[project]
name = "aethier-mcp-bridge"
version = "0.1.0"
description = "Host bridge daemon for aethier-mcp containerized MCP servers."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["websockets>=13"]
authors = [{ name = "aethier" }]

[project.scripts]
aethier-mcp-bridge = "aethier_mcp_bridge.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aethier_mcp_bridge"]
