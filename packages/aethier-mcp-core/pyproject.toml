[project]
name = "aethier-mcp-core"
version = "0.1.0"
description = "Shared infrastructure for aethier-mcp agents: bridge client + MCP bootstrap."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["mcp>=1.0", "websockets>=13"]
authors = [{ name = "aethier" }]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aethier_mcp_core"]
